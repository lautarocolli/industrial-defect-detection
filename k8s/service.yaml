apiVersion: v1
kind: Service
metadata:
  name: neu-det-api
spec:
  # NodePort exposes the service on a static port on every node
  # Accessible from outside the cluster — right for local kind testing
  # In production on a cloud provider this would be LoadBalancer
  type: NodePort
  selector:
    app: neu-det-api   # routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 8000        # port the service listens on inside the cluster
      targetPort: 8000  # port the container listens on
      nodePort: 30000   # port exposed on the node — access via localhost:30000
